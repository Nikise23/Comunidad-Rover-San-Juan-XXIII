services:
  - type: web
    name: comunidad-rover-app
    runtime: node
    region: oregon

    # Usamos la raíz del repo y construimos backend + frontend
    rootDir: .

    buildCommand: |
      npm install --prefix backend
      npm install --prefix frontend
      npm run build --prefix frontend
      npm run build --prefix backend

    startCommand: npm run start:prod --prefix backend

    envVars:
      - key: NODE_ENV
        value: production
      # URL de Neon (se completa en el panel de Render)
      - key: DATABASE_URL
        sync: false
      # Origen del front (CORS). Ej.: https://comunidad-rover-frontend.onrender.com
      - key: FRONTEND_URL
        sync: false
      # Obligatorio en producción: cadena larga y aleatoria para firmar JWT
      - key: JWT_SECRET
        sync: false
      # Primera vez con la tabla users: poner true un deploy, luego quitar o false
      - key: SYNC_DB
        value: 'false'
